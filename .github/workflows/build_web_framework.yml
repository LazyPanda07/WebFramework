name: "Build WebFramework"


on:
  workflow_call:
    inputs:
      os:
        description: "runs-on OS"
        required: true
        type: string
      image:
        description: "Custom Docker image"
        required: false
        type: string
      configuration:
        description: "Build configuration"
        required: true
        type: string
      build-parameters:
        description: "CMake build parameters"
        required: false
        type: string
      cmake-generator:
        description: "CMake generator"
        required: false
        type: string
        default: "Ninja"
      python-version:
        description: "Python version"
        required: false
        type: string
        default: ''
      dotnet-version:
        description: ".NET version"
        required: false
        type: string
        default: ''
      upload-artifact-name:
        description: "Name of uploaded artifact zip"
        required: false
        type: string


jobs:
  build:
    runs-on: ${{ inputs.os }}
    container: 
      image: ${{ inputs.image }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Enable NMake
      if: ${{ inputs.os == 'windows-latest' }}
      uses: ilammy/msvc-dev-cmd@v1.13.0
      
    - name: Install Python
      if: ${{ inputs.python-version != '' }}
      uses: actions/setup-python@v6
      with:
        python-version: "${{ inputs.python-version }}"

    - name: Get current branch
      uses : LazyPanda07/extract-current-branch@master

    - name: Append WITH_STACKTRACE=ON to ADDITIONAL_BUILD_PARAMETERS on Windows at main branch
      if: ${{ inputs.os == 'windows-latest' && env.CURRENT_BRANCH == 'main' }}
      shell: bash
      run: export ADDITIONAL_BUILD_PARAMETERS="${ADDITIONAL_BUILD_PARAMETERS} -DWITH_STACKTRACE=ON"

    - name: Append WITH_PYTHON_EXECUTORS=OFF to ADDITIONAL_BUILD_PARAMETERS
      if: ${{ inputs.python-version == '' }}
      shell: bash
      run: export ADDITIONAL_BUILD_PARAMETERS="${ADDITIONAL_BUILD_PARAMETERS} -DWITH_PYTHON_EXECUTORS=OFF"

    - name: Append WITH_PYTHON_EXECUTORS=ON to ADDITIONAL_BUILD_PARAMETERS
      if: ${{ inputs.python-version != '' }}
      shell: bash
      run: export ADDITIONAL_BUILD_PARAMETERS="${ADDITIONAL_BUILD_PARAMETERS} -DWITH_PYTHON_EXECUTORS=ON"

    - name: Append WITH_DOT_NET_EXECUTORS=OFF to ADDITIONAL_BUILD_PARAMETERS
      if: ${{ inputs.dotnet-version == '' }}
      shell: bash
      run: export ADDITIONAL_BUILD_PARAMETERS="${ADDITIONAL_BUILD_PARAMETERS} -DWITH_DOT_NET_EXECUTORS=OFF"

    - name: Append WITH_DOT_NET_EXECUTORS=ON to ADDITIONAL_BUILD_PARAMETERS
      if: ${{ inputs.dotnet-version != '' }}
      shell: bash
      run: export ADDITIONAL_BUILD_PARAMETERS="${ADDITIONAL_BUILD_PARAMETERS} -DWITH_DOT_NET_EXECUTORS=ON -DDOTNET_RUNTIME_VERSION=${{ inputs.dotnet-version }}"

    - name: Build
      shell: bash
      run: |
          mkdir build
          cd build
          cmake -DCMAKE_INSTALL_PREFIX=../WebFrameworkLibrary -DCMAKE_BUILD_TYPE=${{ inputs.configuration }} ${{ inputs.build-parameters }} "${ADDITIONAL_BUILD_PARAMETERS}" -G ${{ inputs.cmake-generator }} ..
          cmake --build . --config ${{ inputs.configuration }} -j
          cmake --install . --config ${{ inputs.configuration }}
  
    - name: Upload artifacts
      if: ${{ inputs.upload-artifact-name != '' }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.upload-artifact-name }}
        path: WebFrameworkLibrary
