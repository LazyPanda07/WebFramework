  linux-executors-build:
    runs-on: ubuntu-latest
    needs: linux-build
    container:
      image: ghcr.io/lazypanda07/ubuntu_cxx20:24.04
    strategy:
      matrix:
        executors: [CXX, CC, Python, CSharp]

    steps:
    - uses: actions/checkout@v6
      
    - name: Download WebFramework
      uses: actions/download-artifact@v6
      with:
        name: Linux
        path: WebFrameworkLibrary

    - name: Build ${{ matrix.executors }} Executors
      working-directory: Tests
      run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF -DBUILD_EXECUTORS=${{ matrix.executors }} -G ${{ env.LINUX_CMAKE_GENERATOR }} ..
          cmake --build . -j --config Release
          cmake --install . --config Release

    - name: Upload executors
      uses: actions/upload-artifact@v6
      with:
        name: LinuxExecutors-${{ matrix.executors }}
        path: Tests/build/bin


  # windows-tests-build:
  #   runs-on: windows-latest
  #   needs: windows-build

  #   steps:
  #   - uses: actions/checkout@v6
    
  #   - name: Enable NMake
  #     uses: ilammy/msvc-dev-cmd@v1.13.0
      
  #   - name: Download WebFramework
  #     uses: actions/download-artifact@v6
  #     with:
