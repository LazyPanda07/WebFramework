name: "Continuous Integration"


on:
  push:
    branches: [main, dev]
  workflow_dispatch:


env:
  WINDOWS_CMAKE_GENERATOR: "Ninja"
  LINUX_CMAKE_GENERATOR: "Ninja"
  PYTHON_VERSION: 3.14


permissions:
  contents: write


jobs:
  windows-build:
    strategy:
      matrix:
        build-cc-api: [ON, OFF]
        python-config:
          - { with-python-executors: ON, build-python-api: ON, python-version: 3.12 }
          - { with-python-executors: ON, build-python-api: ON, python-version: 3.13 }
          - { with-python-executors: ON, build-python-api: ON, python-version: 3.14 }
          - { with-python-executors: ON, build-python-api: OFF, python-version: 3.12 }
          - { with-python-executors: ON, build-python-api: OFF, python-version: 3.13 }
          - { with-python-executors: ON, build-python-api: OFF, python-version: 3.14 }
          - { with-python-executors: OFF, build-python-api: ON, python-version: 3.12 }
          - { with-python-executors: OFF, build-python-api: ON, python-version: 3.13 }
          - { with-python-executors: OFF, build-python-api: ON, python-version: 3.14 }
          - { with-python-executors: OFF, build-python-api: OFF, python-version: "" }
        with-dotnet-executors: [ON, OFF]
        build-csharp-api: [ON, OFF]

    uses: ./.github/workflows/reusable_build_web_framework.yml
    with:
      os: windows-latest
      configuration: Release
      build-cxx-api: ON
      build-cc-api: ${{ matrix.build-cc-api }}
      with-python-executors: ${{ matrix.python-config.with-python-executors }}
      build-python-api: ${{ matrix.python-config.build-python-api }}
      python-version: ${{ matrix.python-config.python-version }}
      with-dotnet-executors: ${{ matrix.with-dotnet-executors }}
      build-csharp-api: ${{ matrix.build-csharp-api }}
      upload-artifact-name: Windows-WITH_PYTHON_EXECUTORS=${{ matrix.python-config.with-python-executors }}-BUILD_PYTHON_API=${{ matrix.python-config.build-python-api }}-${{ matrix.python-config.python-version }}-WITH_DOTNET_EXECUTORS=${{ matrix.with-dotnet-executors }}-BUILD_CSHARP_API=${{ matrix.build-csharp-api }}-BUILD_CC_API=${{ matrix.build-cc-api }}


  windows-dev-branch-build:
    uses: ./.github/workflows/reusable_build_web_framework.yml
    with:
      os: windows-latest
      configuration: Release
      build-parameters: "-DWITH_STACKTRACE=ON"
    
      
  linux-build:
    strategy:
      matrix:
        build-cc-api: [ON, OFF]
        python-config:
          - { with-python-executors: ON, build-python-api: ON, python-version: 3.12 }
          - { with-python-executors: ON, build-python-api: ON, python-version: 3.13 }
          - { with-python-executors: ON, build-python-api: ON, python-version: 3.14 }
          - { with-python-executors: ON, build-python-api: OFF, python-version: 3.12 }
          - { with-python-executors: ON, build-python-api: OFF, python-version: 3.13 }
          - { with-python-executors: ON, build-python-api: OFF, python-version: 3.14 }
          - { with-python-executors: OFF, build-python-api: ON, python-version: 3.12 }
          - { with-python-executors: OFF, build-python-api: ON, python-version: 3.13 }
          - { with-python-executors: OFF, build-python-api: ON, python-version: 3.14 }
          - { with-python-executors: OFF, build-python-api: OFF, python-version: "" }
        with-dotnet-executors: [ON, OFF]
        build-csharp-api: [ON, OFF]

    uses: ./.github/workflows/reusable_build_web_framework.yml
    with:
      os: ubuntu-latest
      image: ghcr.io/lazypanda07/ubuntu_cxx20:24.04
      configuration: Release
      build-cxx-api: ON
      build-cc-api: ${{ matrix.build-cc-api }}
      with-python-executors: ${{ matrix.python-config.with-python-executors }}
      build-python-api: ${{ matrix.python-config.build-python-api }}
      python-version: ${{ matrix.python-config.python-version }}
      with-dotnet-executors: ${{ matrix.with-dotnet-executors }}
      build-csharp-api: ${{ matrix.build-csharp-api }}
      build-parameters: "-DWITH_STACKTRACE=ON"
      upload-artifact-name: Linux-WITH_PYTHON_EXECUTORS=${{ matrix.python-config.with-python-executors }}-BUILD_PYTHON_API=${{ matrix.python-config.build-python-api }}-${{ matrix.python-config.python-version }}-WITH_DOTNET_EXECUTORS=${{ matrix.with-dotnet-executors }}-BUILD_CSHARP_API=${{ matrix.build-csharp-api }}-BUILD_CC_API=${{ matrix.build-cc-api }}


  linux-aarch64-build:
    uses: ./.github/workflows/reusable_build_web_framework.yml
    with:
      os: ubuntu-latest
      image: ghcr.io/lazypanda07/ubuntu_cxx20:aarch64
      configuration: Release
      build-parameters: "-DCMAKE_TOOLCHAIN_FILE=../toolchain-aarch64.cmake -DBUILD_CSHARP_API=OFF -DBUILD_PYTHON_API=OFF -DBUILD_FLUTTER_API=OFF"
      build-cxx-api: ON
      build-cc-api: ON
      with-python-executors: OFF
      build-python-api: OFF
      with-dotnet-executors: OFF
      build-csharp-api: OFF
      upload-artifact-name: LinuxARM
      

  android-build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/lazypanda07/ubuntu_cxx20:android

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Build
      run: |
          mkdir build
          cd build
          cmake -DCMAKE_INSTALL_PREFIX=../WebFrameworkLibrary -DCMAKE_BUILD_TYPE=MinSizeRel ${ANDROID_CMAKE_BUILD_ARGUMENTS} ..
          cmake --build . -j 
          make install/strip

    - name: Move
      working-directory: WebFrameworkLibrary
      run: |
          cd lib
          mkdir arm64-v8a
          mv *.so arm64-v8a
          rm -rf *.a
          rm -rf vendor

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: Android
        path: WebFrameworkLibrary
        

  windows-executors-build:
    runs-on: windows-latest
    needs: windows-build
    strategy:
      matrix:
        executors: 
          - { api: CXX, artifact-name: Windows-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=OFF-BUILD_CSHARP_API=OFF-BUILD_CC_API=OFF }
          - { api: CC, artifact-name: Windows-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=OFF-BUILD_CSHARP_API=OFF-BUILD_CC_API=ON }
          - { api: Python, artifact-name: Windows-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=OFF-BUILD_CSHARP_API=OFF-BUILD_CC_API=OFF }
          - { api: CSharp, artifact-name: Windows-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=OFF-BUILD_CSHARP_API=ON-BUILD_CC_API=OFF }

    steps:
    - uses: actions/checkout@v6
    
    - name: Enable NMake
      uses: ilammy/msvc-dev-cmd@v1.13.0

    - name: Download ${{ matrix.executors.artifact-name }}
      uses: actions/download-artifact@v6
      with:
        name: ${{ matrix.executors.artifact-name }}
        path: WebFrameworkLibrary

    - name: Build ${{ matrix.executors.api }} Executors
      working-directory: Tests
      run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF -DBUILD_EXECUTORS=${{ matrix.executors.api }} -G ${{ env.WINDOWS_CMAKE_GENERATOR }} ..
          cmake --build . -j --config Release
          cmake --install . --config Release

    - name: Upload executors
      uses: actions/upload-artifact@v6
      with:
        name: WindowsExecutors-${{ matrix.executors.api }}
        path: Tests/build/bin


  linux-executors-build:
    runs-on: ubuntu-latest
    needs: linux-build
    container:
      image: ghcr.io/lazypanda07/ubuntu_cxx20:24.04
    strategy:
      matrix:
        executors: 
          - { api: CXX, artifact-name: Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=OFF-BUILD_CSHARP_API=OFF-BUILD_CC_API=OFF }
          - { api: CC, artifact-name: Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=OFF-BUILD_CSHARP_API=OFF-BUILD_CC_API=ON }
          - { api: Python, artifact-name: Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=OFF-BUILD_CSHARP_API=OFF-BUILD_CC_API=OFF }
          - { api: CSharp, artifact-name: Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=OFF-BUILD_CSHARP_API=ON-BUILD_CC_API=OFF }

    steps:
    - uses: actions/checkout@v6
      
    - name: Download ${{ matrix.executors.artifact-name }}
      uses: actions/download-artifact@v6
      with:
        name: ${{ matrix.executors.artifact-name }}
        path: WebFrameworkLibrary

    - name: Build ${{ matrix.executors.api }} Executors
      working-directory: Tests
      run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF -DBUILD_EXECUTORS=${{ matrix.executors.api }} -G ${{ env.LINUX_CMAKE_GENERATOR }} ..
          cmake --build . -j --config Release
          cmake --install . --config Release

    - name: Upload executors
      uses: actions/upload-artifact@v6
      with:
        name: LinuxExecutors-${{ matrix.executors.api }}
        path: Tests/build/bin


  windows-tests-build:
    runs-on: windows-latest
    needs: windows-build

    steps:
    - uses: actions/checkout@v6
    
    - name: Enable NMake
      uses: ilammy/msvc-dev-cmd@v1.13.0
      
    - name: Download WebFramework
      uses: actions/download-artifact@v6
      with:
        name: Windows-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=ON-3.14-WITH_DOTNET_EXECUTORS=OFF-BUILD_CSHARP_API=ON-BUILD_CC_API=ON
        path: WebFrameworkLibrary

    - name: Build tests
      working-directory: Tests
      run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DBUILD_EXECUTORS=NONE -DCXX_API=ON -DCC_API=ON -DPYTHON_API=ON -DCSHARP_API=ON -G ${{ env.WINDOWS_CMAKE_GENERATOR }} ..
          cmake --build . -j --config Release
          cmake --install . --config Release

    - name: Upload tests
      uses: actions/upload-artifact@v6
      with:
        name: WindowsTests
        path: Tests/build/bin


  linux-tests-build:
    runs-on: ubuntu-latest
    needs: linux-build
    container:
      image: ghcr.io/lazypanda07/ubuntu_cxx20:24.04
    
    steps:
    - uses: actions/checkout@v6
      
    - name: Download WebFramework
      uses: actions/download-artifact@v6
      with:
        name: Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=ON-3.14-WITH_DOTNET_EXECUTORS=OFF-BUILD_CSHARP_API=ON-BUILD_CC_API=ON
        path: WebFrameworkLibrary

    - name: Build tests
      working-directory: Tests
      run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DBUILD_EXECUTORS=NONE -DCXX_API=ON -DCC_API=ON -DPYTHON_API=ON -DCSHARP_API=ON -G ${{ env.LINUX_CMAKE_GENERATOR }} ..
          cmake --build . -j --config Release
          cmake --install . --config Release

    - name: Upload tests
      uses: actions/upload-artifact@v6
      with:
        name: LinuxTests
        path: Tests/build/bin


  linux-tests:
    needs: [linux-tests-build, linux-executors-build]
    strategy:
      matrix:
        config: [multi_threaded_config.json, thread_pool_config.json, multi_threaded_config_https.json, thread_pool_config_https.json]
        api_test: [run_tests.sh, run_cc_tests.sh, run_csharp_tests.sh, run_python_tests.sh]
        executors:
          - { api: CXX, python-version: 3.14, dotnet: true }
          - { api: CC, python-version: 3.14, dotnet: true }
          - { api: Python, python-version: 3.14, dotnet: true }
          - { api: CSharp, python-version: 3.14, dotnet: true }
          - { api: CXX, python-version: 3.13, dotnet: true }
          - { api: CC, python-version: 3.13, dotnet: true }
          - { api: Python, python-version: 3.13, dotnet: true }
          - { api: CSharp, python-version: 3.13, dotnet: true }
          - { api: CXX, python-version: 3.12, dotnet: true }
          - { api: CC, python-version: 3.12, dotnet: true }
          - { api: Python, python-version: 3.12, dotnet: true }
          - { api: CSharp, python-version: 3.12, dotnet: true }

    uses: ./.github/workflows/reusable_run_test.yml
    with:
      os: ubuntu-latest
      image: ghcr.io/lazypanda07/ubuntu_cxx20:24.04
      executors-api: ${{ matrix.executors.api }}
      web-framework-config: ${{ matrix.config }}
      test-script: ${{ matrix.test-script }}
      python-version: ${{ matrix.executors.python-version }}
      dotnet: ${{ matrix.executors.dotnet }}
      

  windows-tests:
    needs: [windows-tests-build, windows-executors-build]
    strategy:
      matrix:
        config: [multi_threaded_config.json, thread_pool_config.json, multi_threaded_config_https.json, thread_pool_config_https.json]
        test-script: [run_tests.bat, run_cc_tests.bat, run_csharp_tests.bat, run_python_tests.bat]
        executors:
          - { api: CXX, python-version: 3.14, dotnet: true }
          - { api: CC, python-version: 3.14, dotnet: true }
          - { api: Python, python-version: 3.14, dotnet: true }
          - { api: CSharp, python-version: 3.14, dotnet: true }
          - { api: CXX, python-version: 3.13, dotnet: true }
          - { api: CC, python-version: 3.13, dotnet: true }
          - { api: Python, python-version: 3.13, dotnet: true }
          - { api: CSharp, python-version: 3.13, dotnet: true }
          - { api: CXX, python-version: 3.12, dotnet: true }
          - { api: CC, python-version: 3.12, dotnet: true }
          - { api: Python, python-version: 3.12, dotnet: true }
          - { api: CSharp, python-version: 3.12, dotnet: true }

    uses: ./.github/workflows/reusable_run_test.yml
    with:
      os: windows-latest
      executors-api: ${{ matrix.executors.api }}
      web-framework-config: ${{ matrix.config }}
      test-script: ${{ matrix.test-script }}
      python-version: ${{ matrix.executors.python-version }}
      dotnet: ${{ matrix.executors.dotnet }}
      

  linux-aarch64-cxx-tests:
    runs-on: ubuntu-latest
    needs: linux-aarch64-build
    container:
      image: ghcr.io/lazypanda07/ubuntu_cxx20:aarch64
    strategy:
      matrix:
        config: [aarch64_multi_threaded_config.json, aarch64_thread_pool_config.json, aarch64_multi_threaded_config_https.json, aarch64_thread_pool_config_https.json]

    steps:
    - uses: actions/checkout@v6

    - name: Download artifacts
      uses: actions/download-artifact@v6
      with:
        name: LinuxARM
        path: WebFrameworkLibrary
        
    - name: Build tests
      working-directory: Tests
      run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCXX_API=ON -DCMAKE_TOOLCHAIN_FILE=../../toolchain-aarch64.cmake -DBUILD_EXECUTORS=CXX -G ${{ env.LINUX_CMAKE_GENERATOR }} ..
          cmake --build . -j --config Release
          cmake --install . --config Release

    - name: Install curl
      run: apt update && apt install -y curl

    - name: Tests
      working-directory: Tests
      shell: bash
      run: |
          cd build/bin
          source run_aarch64_cxx_tests.sh ${{ matrix.config }}
          
          
  linux-aarch64-cc-tests:
    runs-on: ubuntu-latest
    needs: linux-aarch64-build
    container:
      image: ghcr.io/lazypanda07/ubuntu_cxx20:aarch64
    strategy:
      matrix:
        config: [aarch64_multi_threaded_config.json, aarch64_thread_pool_config.json, aarch64_multi_threaded_config_https.json, aarch64_thread_pool_config_https.json]

    steps:
    - uses: actions/checkout@v6

    - name: Download artifacts
      uses: actions/download-artifact@v6
      with:
        name: LinuxARM
        path: WebFrameworkLibrary
        
    - name: Build tests
      working-directory: Tests
      run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCXX_API=ON -DCC_API=ON -DCMAKE_TOOLCHAIN_FILE=../../toolchain-aarch64.cmake -DBUILD_EXECUTORS=CC -G ${{ env.LINUX_CMAKE_GENERATOR }} ..
          cmake --build . -j --config Release
          cmake --install . --config Release

    - name: Install curl
      run: apt update && apt install -y curl

    - name: Tests
      working-directory: Tests
      shell: bash
      run: |
          cd build/bin
          source run_aarch64_cc_tests.sh ${{ matrix.config }}
          

  publish:
    needs: [
      android-build,
      linux-tests,
      windows-tests,
      linux-aarch64-cxx-tests,
      linux-aarch64-cc-tests
    ]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Get current branch
      uses : LazyPanda07/extract-current-branch@master
    
    - name: Setup release version variable
      shell: pwsh
      run: echo "VERSION=$($($($(Select-String -Path .\WebFramework\src\CAPI\WebFrameworkCAPI.cpp -Pattern version) -split '( = )')[3].TrimEnd(';')).Trim('\"'))" >> $Env:GITHUB_ENV

    - name: Download artifacts
      uses: actions/download-artifact@v6

    - name: Remove tests and executors
      run: |
          rm -rf WindowsTests
          rm -rf WindowsExecutors*
          rm -rf LinuxTests
          rm -rf LinuxExecutors*
      
    - name: Create Windows and Linux zips
      run: |
        for directory in Windows-*/; do
          zip -r "${directory%/}.zip" ${directory}
        done
        
        for directory in Linux-*/; do
          zip -r "${directory%/}.zip" ${directory}
        done
        
    - name: Create Android zip
      run: zip -r android.zip Android

    - name: Create Linux ARM64 zip
      run: zip -r linux_aarch64.zip LinuxARM

    - name: Publish
      if: ${{ env.CURRENT_BRANCH == 'main' }}
      run: gh release upload v${{ env.VERSION }} *.zip --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
