  #     python-version: ${{ matrix.executors.python-version }}
  #     dotnet-version: ${{ matrix.executors.dotnet-version }}
      

  linux-aarch64-cxx-tests:
    runs-on: ubuntu-latest
    needs: linux-aarch64-build
    container:
      image: ghcr.io/lazypanda07/ubuntu_cxx20:aarch64
    strategy:
      matrix:
        config: [aarch64_multi_threaded_config.json, aarch64_thread_pool_config.json, aarch64_multi_threaded_config_https.json, aarch64_thread_pool_config_https.json]

    steps:
    - uses: actions/checkout@v6

    - name: Download artifacts
      uses: actions/download-artifact@v6
      with:
        name: LinuxARM
        path: WebFrameworkLibrary
        
    - name: Build tests
      working-directory: Tests
      run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCXX_API=ON -DCMAKE_TOOLCHAIN_FILE=../../toolchain-aarch64.cmake -DBUILD_EXECUTORS=CXX -G ${{ env.LINUX_CMAKE_GENERATOR }} ..
          cmake --build . -j --config Release
          cmake --install . --config Release

    - name: Install curl
      run: apt update && apt install -y curl

    - name: Tests
      working-directory: Tests
      shell: bash
      run: |
          cd build/bin
          source run_aarch64_cxx_tests.sh ${{ matrix.config }}
          
          
  linux-aarch64-cc-tests:
    runs-on: ubuntu-latest
    needs: linux-aarch64-build
    container:
      image: ghcr.io/lazypanda07/ubuntu_cxx20:aarch64
    strategy:
      matrix:
        config: [aarch64_multi_threaded_config.json, aarch64_thread_pool_config.json, aarch64_multi_threaded_config_https.json, aarch64_thread_pool_config_https.json]

    steps:
    - uses: actions/checkout@v6

    - name: Download artifacts
      uses: actions/download-artifact@v6
      with:
        name: LinuxARM
        path: WebFrameworkLibrary
        
    - name: Build tests
      working-directory: Tests
      run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCXX_API=ON -DCC_API=ON -DCMAKE_TOOLCHAIN_FILE=../../toolchain-aarch64.cmake -DBUILD_EXECUTORS=CC -G ${{ env.LINUX_CMAKE_GENERATOR }} ..
          cmake --build . -j --config Release
          cmake --install . --config Release

    - name: Install curl
      run: apt update && apt install -y curl

    - name: Tests
      working-directory: Tests
      shell: bash
      run: |
          cd build/bin
          source run_aarch64_cc_tests.sh ${{ matrix.config }}
          

  publish:
    needs: [
      android-build,
      linux-tests,
      # windows-tests,
      linux-aarch64-cxx-tests,
      linux-aarch64-cc-tests
    ]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Get current branch
      uses : LazyPanda07/extract-current-branch@master
    
    - name: Setup release version variable
      shell: pwsh
      run: echo "VERSION=$($($($(Select-String -Path .\WebFramework\src\CAPI\WebFrameworkCAPI.cpp -Pattern version) -split '( = )')[3].TrimEnd(';')).Trim('\"'))" >> $Env:GITHUB_ENV

    - name: Download artifacts
      uses: actions/download-artifact@v6

    - name: Remove Windows tests
      run: |
          rm -rf WindowsTests
          rm -rf WindowsExecutors*
      
    - name: Create Windows zip
      run: zip -r windows.zip Windows*

    - name: Create Linux zip
      run: zip -r linux.zip Linux

    - name: Create Android zip
      run: zip -r android.zip Android

    - name: Create Linux ARM64 zip
      run: zip -r linux_aarch64.zip LinuxARM

    - name: Publish
      if: ${{ env.CURRENT_BRANCH == 'main' }}
      run: gh release upload v${{ env.VERSION }} *.zip --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
