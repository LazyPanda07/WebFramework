name: "Continuous Integration"


on:
  push:
    branches: [main, dev]
  workflow_dispatch:


env:
  WINDOWS_CMAKE_GENERATOR: "Ninja"
  LINUX_CMAKE_GENERATOR: "Ninja"
  PYTHON_VERSION: 3.14


permissions:
  contents: write


jobs:
  windows-build:
    strategy:
      matrix:
        python-config:
          - { with-python-executors: ON, build-python-api: ON, python-version: 3.14 }
          - { with-python-executors: ON, build-python-api: ON, python-version: 3.13 }
          - { with-python-executors: ON, build-python-api: ON, python-version: 3.12 }
          - { with-python-executors: ON, build-python-api: OFF, python-version: 3.14 }
          - { with-python-executors: ON, build-python-api: OFF, python-version: 3.13 }
          - { with-python-executors: ON, build-python-api: OFF, python-version: 3.12 }
          - { with-python-executors: OFF, build-python-api: ON, python-version: 3.14 }
          - { with-python-executors: OFF, build-python-api: ON, python-version: 3.13 }
          - { with-python-executors: OFF, build-python-api: ON, python-version: 3.12 }
          - { with-python-executors: OFF, build-python-api: OFF, python-version: "" }
        with-dotnet-executors: [ON, OFF]
        build-csharp-api: [ON, OFF]

    uses: ./.github/workflows/build_web_framework.yml
    with:
      os: windows-latest
      configuration: Release
      with-python-executors: ${{ matrix.python-config.with-python-executors }}
      build-python-api: ${{ matrix.python-config.build-python-api }}
      python-version: ${{ matrix.python-config.python-version }}
      upload-artifact-name: Windows-WITH_PYTHON_EXECUTORS=${{ matrix.python-config.with-python-executors }}-BUILD_PYTHON_API=${{ matrix.python-config.build-python-api }}${{ matrix.python-config.python-version }}-WITH_DOTNET_EXECUTORS=${{ matrix.with-dotnet-executors }}-BUILD_CSHARP_API=${{ matrix.build-csharp-api }}


  windows-dev-branch-build:
    uses: ./.github/workflows/build_web_framework.yml
    with:
      os: windows-latest
      configuration: Release
      build-parameters: "-DWITH_STACKTRACE=ON"
    
      
  linux-build:
    uses: ./.github/workflows/build_web_framework.yml
    with:
      os: ubuntu-latest
      image: ghcr.io/lazypanda07/ubuntu_cxx20:24.04
      configuration: Release
      python-executors-version: 3.14
      build-parameters: "-DWITH_STACKTRACE=ON"
      upload-artifact-name: Linux


  linux-aarch64-build:
    uses: ./.github/workflows/build_web_framework.yml
    with:
      os: ubuntu-latest
      image: ghcr.io/lazypanda07/ubuntu_cxx20:aarch64
      configuration: Release
      build-parameters: "-DCMAKE_TOOLCHAIN_FILE=../toolchain-aarch64.cmake -DBUILD_CSHARP_API=OFF -DBUILD_PYTHON_API=OFF -DBUILD_FLUTTER_API=OFF"
      upload-artifact-name: LinuxARM
      

  android-build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/lazypanda07/ubuntu_cxx20:android

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Build
      run: |
          mkdir build
          cd build
          cmake -DCMAKE_INSTALL_PREFIX=../WebFrameworkLibrary -DCMAKE_BUILD_TYPE=MinSizeRel ${ANDROID_CMAKE_BUILD_ARGUMENTS} ..
          cmake --build . -j 
          make install/strip

    - name: Move
      working-directory: WebFrameworkLibrary
      run: |
          cd lib
          mkdir arm64-v8a
          mv *.so arm64-v8a
          rm -rf *.a
          rm -rf vendor

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: Android
        path: WebFrameworkLibrary
        

