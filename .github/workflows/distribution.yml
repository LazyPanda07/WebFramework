name: Distribution


on:
  workflow_dispatch:


env:
  deb-package-version: 3.3.0
  deb-package-release-number: 14
  PYTHON_VERSION: 3.14
  TWINE_PYTHON_VERSION: 3.13


jobs:
  nuget-package:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Get Linux latest release
      uses: robinraju/release-downloader@v1.12
      with:
        repository: ${{ github.repository }}
        latest: true
        extract: true
        fileName: Linux-WITH_PYTHON_EXECUTORS.OFF-BUILD_PYTHON_API.OFF--WITH_DOTNET_EXECUTORS.ON-BUILD_CSHARP_API.OFF-BUILD_CC_API.OFF.zip

    - name: Get Windows latest release
      uses: robinraju/release-downloader@v1.12
      with:
        repository: ${{ github.repository }}
        latest: true
        extract: true
        fileName: Windows-WITH_PYTHON_EXECUTORS.OFF-BUILD_PYTHON_API.OFF--WITH_DOTNET_EXECUTORS.ON-BUILD_CSHARP_API.OFF-BUILD_CC_API.OFF.zip
        
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Move libraries
      shell: bash
      run: |
          mv Windows-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=ON-BUILD_CSHARP_API=OFF-BUILD_CC_API=OFF/dll/*.dll API/CSharp_API/
          mv Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=ON-BUILD_CSHARP_API=OFF-BUILD_CC_API=OFF/lib/*.so API/CSharp_API/
          mv Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=ON-BUILD_CSHARP_API=OFF-BUILD_CC_API=OFF/license/* API/CSharp_API/

    - name: Create nuget package
      working-directory: API/CSharp_API/
      run: |
          dotnet build --configuration Release
          msbuild -t:pack -p:Configuration=Release

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: nuget-package
        path: API/CSharp_API/bin/Release/*.nupkg


  flutter-package:
    runs-on: ubuntu-latest
    container:
      image: lazypanda07/ubuntu_cxx20:android

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Get Windows latest release
      uses: robinraju/release-downloader@v1.12
      with:
        repository: ${{ github.repository }}
        latest: true
        extract: true
        fileName: Windows-WITH_PYTHON_EXECUTORS.OFF-BUILD_PYTHON_API.OFF--WITH_DOTNET_EXECUTORS.ON-BUILD_CSHARP_API.OFF-BUILD_CC_API.OFF.zip

    - name: Get Android latest release
      uses: robinraju/release-downloader@v1.12
      with:
        repository: ${{ github.repository }}
        latest: true
        extract: true
        fileName: android.zip

    - name: Copy libraries
      run: |
          mkdir -p API/web_framework_flutter_api/assets/lib/arm64-v8a
          cp -r Windows-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=ON-BUILD_CSHARP_API=OFF-BUILD_CC_API=OFF/dll/*.dll API/web_framework_flutter_api/assets/lib
          cp -r Android/lib/arm64-v8a/*.so API/web_framework_flutter_api/assets/lib/arm64-v8a

    - name: Dry run
      working-directory: API/web_framework_flutter_api
      run: dart pub publish --dry-run

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: flutter-package
        path: API/web_framework_flutter_api

        
  deb-package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package-type: [deploy, dev]

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Get Linux latest release
      uses: robinraju/release-downloader@v1.12
      with:
        repository: ${{ github.repository }}
        latest: true
        extract: true
        fileName: Linux-WITH_PYTHON_EXECUTORS.OFF-BUILD_PYTHON_API.OFF--WITH_DOTNET_EXECUTORS.ON-BUILD_CSHARP_API.OFF-BUILD_CC_API.ON.zip

    - name: Create deb package
      if: ${{ matrix.package-type == 'deploy' }}
      run: |
          mkdir -p web-framework_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/share/doc/web-framework
          mkdir -p web-framework_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/lib/web-framework/lib
          mkdir -p web-framework_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/etc/ld.so.conf.d
          chmod 0755 deb_packages/web-framework/DEBIAN/postinst
          cp deb_packages/web-framework/DEBIAN/copyright web-framework_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/share/doc/web-framework
          mv deb_packages/web-framework/DEBIAN web-framework_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64
          cp -r Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=ON-BUILD_CSHARP_API=OFF-BUILD_CC_API=ON/lib/*.so web-framework_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/lib/web-framework/lib
          cp -r Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=ON-BUILD_CSHARP_API=OFF-BUILD_CC_API=ON/WebFrameworkAssets web-framework_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/lib/web-framework
          cp -r Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=ON-BUILD_CSHARP_API=OFF-BUILD_CC_API=ON/localization_modules.json web-framework_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/lib/web-framework
          echo "/usr/lib/web-framework/lib" > web-framework_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/etc/ld.so.conf.d/web-framework.conf
          dpkg --build web-framework_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64
    
    - name: Create deb dev package
      if: ${{ matrix.package-type == 'dev' }}
      run: |
          mkdir -p web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/share/doc/web-framework
          mkdir -p web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/lib/web-framework/lib
          mkdir -p web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/etc/ld.so.conf.d
          mkdir -p web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/lib/web-framework/cmake
          mkdir -p web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/lib/web-framework/api/cc/include
          mkdir -p web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/lib/web-framework/api/cxx/include
          chmod 0755 deb_packages/web-framework-dev/DEBIAN/postinst
          cp deb_packages/web-framework-dev/DEBIAN/copyright web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/share/doc/web-framework
          mv deb_packages/web-framework-dev/DEBIAN web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64
          cp -r Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=ON-BUILD_CSHARP_API=OFF-BUILD_CC_API=ON/lib/* web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/lib/web-framework/lib
          cp -r Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=ON-BUILD_CSHARP_API=OFF-BUILD_CC_API=ON/api/cc/include/* web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/lib/web-framework/api/cc/include
          cp -r Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=ON-BUILD_CSHARP_API=OFF-BUILD_CC_API=ON/api/cxx/include/* web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/lib/web-framework/api/cxx/include
          cp -r Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=ON-BUILD_CSHARP_API=OFF-BUILD_CC_API=ON/WebFrameworkConfig.cmake web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/lib/web-framework
          cp -r Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=ON-BUILD_CSHARP_API=OFF-BUILD_CC_API=ON/FindWebFramework.cmake web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/lib/web-framework
          cp -r Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=ON-BUILD_CSHARP_API=OFF-BUILD_CC_API=ON/cmake/* web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/lib/web-framework/cmake
          cp -r Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=ON-BUILD_CSHARP_API=OFF-BUILD_CC_API=ON/WebFrameworkAssets web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/lib/web-framework
          cp -r Linux-WITH_PYTHON_EXECUTORS=OFF-BUILD_PYTHON_API=OFF--WITH_DOTNET_EXECUTORS=ON-BUILD_CSHARP_API=OFF-BUILD_CC_API=ON/localization_modules.json web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/usr/lib/web-framework
          echo "/usr/lib/web-framework/lib" > web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64/etc/ld.so.conf.d/web-framework-dev.conf
          dpkg --build web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64
          
    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.package-type }}_deb_package
        path: ${{ github.workspace }}/*.deb


  executor-build:
    strategy:
      matrix:
        config: 
          - { os: "windows-latest", asset_name: "Windows-WITH_PYTHON_EXECUTORS.OFF-BUILD_PYTHON_API.OFF--WITH_DOTNET_EXECUTORS.ON-BUILD_CSHARP_API.OFF-BUILD_CC_API.ON.zip", upload_name: "windows-executor" }
          - { os: "ubuntu-latest", asset_name: "Linux-WITH_PYTHON_EXECUTORS.OFF-BUILD_PYTHON_API.OFF--WITH_DOTNET_EXECUTORS.ON-BUILD_CSHARP_API.OFF-BUILD_CC_API.ON.zip", upload_name: "linux-executor" }
    runs-on: ${{ matrix.config.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Get latest release
      uses: robinraju/release-downloader@v1.12
      with:
        repository: ${{ github.repository }}
        latest: true
        extract: true
        fileName: ${{ matrix.config.asset_name }}
        out-file-path: WebFrameworkLibrary
      
    - name: Move assets
      working-directory: WebFrameworkLibrary
      shell: bash
      run: |
        rm -rf *.zip 
        mv $(ls)/* $(pwd)

    - name: Build executor
      working-directory: DistributionTests
      run: |
        mkdir build
        cd build
        cmake -DBUILD_EXECUTOR=ON ..
        cmake --build . -j --config Release
        cmake --install . --config Release

    - name: Upload executor
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.config.upload_name }}
        path: |
          DistributionTests/build/bin/config.json
          DistributionTests/build/bin/web.json
          DistributionTests/build/bin/*hello_executor.*
          
          
  dev-deb-package-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/lazypanda07/ubuntu_cxx20:24.04
    needs: [deb-package]
    strategy:
      matrix:
        config: [ { api_name: TEST_DEV_CC, script: run_cc_test.sh, asset_name: cc_test }, { api_name: TEST_DEV_CXX, script: run_cxx_test.sh, asset_name: cxx_test } ]

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Download deb package
      uses: actions/download-artifact@v8
      with:
        name: dev_deb_package
        path: packages

    - name: Install deb package
      working-directory: packages
      run: sudo apt install -y ./web-framework-dev_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64.deb
      
    - name: Build test
      working-directory: DistributionTests
      run: |
          mkdir build
          cd build
          cmake -D${{ matrix.config.api_name }}=ON -DBUILD_EXECUTOR=ON ..
          cmake --build . -j
          cmake --install .

    - name: Run test
      working-directory: DistributionTests/build/bin
      shell: bash
      run: |
          source ${{ matrix.config.script }}
          diff reference.json out.json
          
    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: binaries_${{ matrix.config.asset_name }}
        path: |
            DistributionTests/build/bin/libhello_executor.so
            DistributionTests/build/bin/${{ matrix.config.script }}
            DistributionTests/build/bin/${{ matrix.config.asset_name }}
            DistributionTests/build/bin/config.json
            DistributionTests/build/bin/web.json
            DistributionTests/build/bin/reference.json

            
  deb-package-test:
    runs-on: ubuntu-latest
    needs: [dev-deb-package-test]
    strategy:
      matrix:
        config:
          - { executable_name: cc_test, script: run_cc_test.sh }
          - { executable_name: cxx_test, script: run_cxx_test.sh }

    steps:
    - name: Download deb package
      uses: actions/download-artifact@v8
      with:
        name: deploy_deb_package
        path: packages

    - name: Install Python
      uses: actions/setup-python@v6
      with:
        python-version: "${{ env.PYTHON_VERSION }}"

    - name: Install deb package
      working-directory: packages
      run: sudo apt install -y ./web-framework_${{ env.deb-package-version }}-${{ env.deb-package-release-number }}_amd64.deb

    - name: Download binaries
      uses: actions/download-artifact@v8
      with:
        name: binaries_${{ matrix.config.executable_name }}

    - name: Run test
      run: |
        chmod +x ${{ matrix.config.executable_name }}
        source ${{ matrix.config.script }}
        diff reference.json out.json
      
  
  nuget-package-test:
    needs: [nuget-package, executor-build]
    strategy:
      matrix:
        config:
          - { os: ubuntu-latest, script: run_csharp_test.sh, executor_name: "linux-executor", run_command: "source " }
          - { os: windows-latest, script: run_csharp_test.bat, executor_name: "windows-executor", run_command: ".\\" }
    runs-on: ${{ matrix.config.os }}

    steps:
    - uses: actions/checkout@v6
  
    - name: Install Python
      uses: actions/setup-python@v6
      with:
        python-version: "${{ env.PYTHON_VERSION }}"

    - name: Download executor
      uses: actions/download-artifact@v8
      with:
        name: ${{ matrix.config.executor_name }}
        path: DistributionTests/build/bin
        
    - name: Download nuget package
      uses: actions/download-artifact@v8
      with:
        name: nuget-package

    - name: Build test
      working-directory: DistributionTests/build
      run: |
          cmake -DTEST_CSHARP=ON ..
          cmake --build . -j --config Release 
          cmake --install . --config Release
          cd bin
          ${{ matrix.config.run_command }}${{ matrix.config.script }}


  publish-nuget-package:
    runs-on: ubuntu-latest
    needs: [
      nuget-package-test,
      deb-package-test,
      dev-deb-package-test,
      flutter-package
    ]

    steps:
    - name: Download nuget package
      uses: actions/download-artifact@v8
      with:
        name: nuget-package

    - name: Publish
      if: false
      run: dotnet nuget push *.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json


  publish-pip-package:
    runs-on: ubuntu-latest
    needs: [
      nuget-package-test,
      deb-package-test,
      dev-deb-package-test,
      flutter-package
    ]

    steps:
    - name: Download Python packages
      uses: robinraju/release-downloader@v1.12
      with:
        fileName: "*-WITH_PYTHON_EXECUTORS.ON-BUILD_PYTHON_API.ON-3.*-WITH_DOTNET_EXECUTORS.ON-BUILD_CSHARP_API.OFF-BUILD_CC_API.OFF.zip"
        latest: true
        out-file-path: WebFrameworkLibrary
        extract: true
        
    - name: Install Python
      uses: actions/setup-python@v6
      with:
        python-version: "${{ env.TWINE_PYTHON_VERSION }}"

    - name: Prepare assets
      working-directory: WebFrameworkLibrary
      shell: bash
      run: |
        rm -rf *.zip
        mkdir -p api/python_api/dist/
        find . -type f -name "*.whl" -exec cp -v -t api/python_api/dist/ {} +

    - name: Install twine
      run: python3 -m pip install twine
      
    - name: Publish
      run: |
          export TWINE_USERNAME="__token__"
          export TWINE_PASSWORD="${{ secrets.PYPI_API_KEY }}"
          twine check WebFrameworkLibrary/api/python_api/dist/*
          twine upload WebFrameworkLibrary/api/python_api/dist/* --verbose


  publish-deb-packages:
    runs-on: ubuntu-latest
    needs: [
      nuget-package-test,
      deb-package-test,
      dev-deb-package-test,
      flutter-package
    ]
    env:
      EMAIL: semengricenko@gmail.com

    steps:
    - uses: actions/checkout@v6
      with:
        repository: LazyPanda07/web_framework_ppa

    - name: Download deb packages
      uses: actions/download-artifact@v8
      with:
        pattern: "*_deb_package"

    - name: Move deb packages
      run: |
        mv deploy_deb_package/*.deb .
        mv dev_deb_package/*.deb .
        rm -rf deploy_deb_package
        rm -rf dev_deb_package
        
    - name: Import GPG key
      uses: crazy-max/ghaction-import-gpg@v6
      with:
        gpg_private_key: ${{ secrets.DEB_GPG_PRIVATE_KEY }}
        passphrase: ${{ secrets.PASSPHRASE }}
        
    - name: Publish
      if: false
      run: |
          git config user.name LazyPanda07
          git config user.email semengricenko@gmail.com

          dpkg-scanpackages --multiversion . > Packages
          gzip -k -f Packages
          
          apt-ftparchive release . > Release
          gpg --default-key "${{ env.EMAIL }}" -abs -o - Release > Release.gpg
          gpg --default-key "${{ env.EMAIL }}" --clearsign -o - Release > InRelease

          git add .
          git commit -m "Update deb packages"
          
          git config --unset-all http.https://github.com/.extraheader || true

          git config -l | grep '^includeif' | cut -d= -f1 | while read key; do
            git config --unset-all "$key" || true
          done

          git push https://x-access-token:${{ secrets.COMMIT_TOKEN }}@github.com/LazyPanda07/web_framework_ppa HEAD:main
          